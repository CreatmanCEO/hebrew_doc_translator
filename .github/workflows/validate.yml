name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check meta files exist
        run: |
          test -f LICENSE
          test -f README.md
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate root package.json
        run: node -e "const p=require('./package.json'); if(!p.name||!p.version||!p.workspaces){process.exit(1)}; console.log('package.json ok:',p.name,p.version,'workspaces:',p.workspaces)"

      - name: Validate api package.json
        run: node -e "const p=require('./packages/api/package.json'); if(!p.name){process.exit(1)}; console.log('api ok:',p.name)"

      - name: Validate client package.json
        run: node -e "const p=require('./packages/client/package.json'); if(!p.name){process.exit(1)}; console.log('client ok:',p.name)"

      - name: Validate shared package.json
        run: node -e "const p=require('./packages/shared/package.json'); if(!p.name){process.exit(1)}; console.log('shared ok:',p.name)"
