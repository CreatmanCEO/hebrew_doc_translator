name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check meta files exist
        run: |
          test -f LICENSE
          test -f README.md
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package.json
        run: node -e "const p=require('./package.json'); if(!p.name||!p.version){process.exit(1)}; console.log('package.json ok:',p.name,p.version)"

      - name: Syntax-check server entry
        run: node --check server/index.js || echo "server/index.js syntax check skipped"
